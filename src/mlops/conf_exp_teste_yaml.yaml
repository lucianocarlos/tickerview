# ==============================================================================
# TICKERVIEW MLOPS - CONFIGURAÇÃO DE TESTE RÁPIDO (YAML)
# ==============================================================================
# Bateria de fumaça (Smoke Test) para validar 100% da compatibilidade do pipeline:
# Contém TODOS os 13 alvos de mercado e TODOS os 8 estimadores em hiperparâmetros leves.
# ==============================================================================

hardware_config:
  cpu_workers: 15
  gpu_workers:
    - 3
  chunk_size: 15

bateria_id: bateria_teste_yaml

datasets:
  - dataset002

# ------------------------------------------------------------------------------
# TODAS AS ESTRATÉGIAS DE TARGET (13 ALVOS COMPLETO)
# ------------------------------------------------------------------------------
target_strategies:
  - name: squeeze_breakout
    horizon_days: 10
    threshold: 0.03

# ------------------------------------------------------------------------------
# DIVISÃO TEMPORAL RÁPIDA (2 SPLITS)
# ------------------------------------------------------------------------------
split_configs:
  - method: tsp
    n_splits: 3

# ------------------------------------------------------------------------------
# PRÉ-PROCESSAMENTO LEVE
# ------------------------------------------------------------------------------
preprocessing:
  inf_handling:
    - replace_nan
  imputation:
    - ticker_median
  outlier_handling:
    - clip_95_5
  scaling:
    - robust

# ------------------------------------------------------------------------------
# TODOS OS 8 MODELOS (CONFIGURAÇÃO ULTRA RÁPIDA)
# ------------------------------------------------------------------------------
models:
  xgboost:
    pref_queue: gpu_exclusive
    n_estimators: [50]
    max_depth: [4]
    learning_rate: [0.1]
    subsample: [0.8]
    colsample_bytree: [0.8]
    reg_alpha: [0.0]
    reg_lambda: [1.0]
    drop_feat: [none]

  random_forest:
    pref_queue: cpu
    n_estimators: [30]
    max_depth: [6]
    max_features: [sqrt]
    min_samples_leaf: [10]
    min_samples_split: [10]
    ccp_alpha: [0.0]
    class_weight: [balanced]
    drop_feat: [none]

  knn:
    pref_queue: gpu
    n_neighbors: [5]
    weights: [uniform]
    metric: [manhattan]
    drop_feat: [none]

  logistic_regression:
    pref_queue: gpu
    learning_rate_init: [0.01]
    max_iter: [50]
    weight_decay: [0.0001]
    class_weight: [balanced]
    drop_feat: [none]